<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <!--
    Content Security Policy: the app is fully local, so everything
    loads from its own origin. No external scripts, frames or objects.
  -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self'; connect-src 'self' blob: data:; worker-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'self'"
  >

  <meta
    id="themeColorMeta"
    name="theme-color"
    content="#241a12"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <title>Katusoitto</title>

  <link
    rel="icon"
    href="./icon.svg"
    type="image/svg+xml"
  >

  <link
    rel="apple-touch-icon"
    href="./icon.svg"
  >

  <link
    rel="manifest"
    href="./manifest.webmanifest"
  >

  <link
    rel="stylesheet"
    href="./styles.css"
  >
</head>

<body>
  <main id="app">

    <!-- Library -->
    <section id="libraryView" class="view">
      <header class="main-header">
        <div>
          <h1>Katusoitto</h1>
          <p>Songs, sheet music and backing tracks</p>
        </div>

        <button
          class="icon-button theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Switch theme"
          title="Switch theme (dark / light)"
        >
          <span class="to-light" aria-hidden="true">☀️</span>
          <span class="to-dark" aria-hidden="true">🌙</span>
        </button>
      </header>

      <!-- Add files -->
      <section
        id="dropZone"
        class="drop-zone"
      >
        <strong id="dropZoneTitle">
          Add a new song
        </strong>

        <p id="dropZoneStatus">
          Drop a PDF and MP3 here
        </p>

        <div
          id="pendingFiles"
          class="pending-files hidden"
        >
          <div
            id="pendingPdf"
            class="pending-file"
          ></div>

          <div
            id="pendingMp3"
            class="pending-file"
          ></div>
        </div>

        <button
          id="chooseFilesButton"
          class="secondary-button"
          type="button"
        >
          Choose files
        </button>

        <input
          id="fileInput"
          type="file"
          accept=".pdf,.mp3,application/pdf,audio/mpeg"
          multiple
          hidden
        >
      </section>

      <!-- Library songs -->
      <section>
        <div class="section-heading">
          <h2>Library</h2>

          <div class="library-tools">
            <span id="songCount">0 songs</span>

            <button
              id="setlistButton"
              class="tool-button"
              type="button"
              title="Open the setlist"
            >
              Setlist
            </button>

            <button
              id="importButton"
              class="tool-button"
              type="button"
              title="Import a library backup (.json)"
            >
              Import
            </button>

            <button
              id="exportButton"
              class="tool-button"
              type="button"
              title="Export the library as a backup (.json)"
            >
              Export
            </button>
          </div>
        </div>

        <input
          id="importInput"
          type="file"
          accept=".json,application/json"
          hidden
        >

        <div
          id="songGrid"
          class="song-grid"
        ></div>

        <div
          id="emptyState"
          class="empty-state"
        >
          <h2>Your library is empty</h2>

          <p>
            Add your first song.
          </p>
        </div>
      </section>
    </section>

    <!-- Setlist & gig -->
    <section
      id="setlistView"
      class="view hidden"
    >
      <header class="main-header">
        <div>
          <h1>Setlist</h1>
          <p id="setlistSummary">0 songs</p>
        </div>

        <button
          id="setlistBackButton"
          class="icon-button"
          type="button"
          aria-label="Back to library"
          title="Back to library"
        >
          ← Library
        </button>
      </header>

      <div class="gig-controls">
        <button
          id="startGigButton"
          class="primary-button full-width"
          type="button"
        >
          Start gig
        </button>

        <button
          id="resumeGigButton"
          class="primary-button full-width hidden"
          type="button"
        >
          Resume gig
        </button>

        <button
          id="endGigButton"
          class="danger-button full-width hidden"
          type="button"
        >
          End gig
        </button>
      </div>

      <div
        id="setlistItems"
        class="setlist-items"
      ></div>

      <section class="setlist-add">
        <div class="section-heading">
          <h2>Add songs</h2>
        </div>

        <div
          id="setlistCandidates"
          class="setlist-candidates"
        ></div>
      </section>
    </section>

    <!-- Sheet music & player -->
    <section
      id="playerView"
      class="view hidden"
    >
      <header class="player-header">
        <button
          id="backButton"
          class="icon-button"
          type="button"
          aria-label="Back to library"
          title="Back to library"
        >
          ← Library
        </button>

        <div class="player-title">
          <strong id="currentSongTitle">
            Song
          </strong>

          <span
            id="pageIndicator"
            class="hidden"
          >
            Page 1 / 1
          </span>

          <span
            id="gigIndicator"
            class="hidden"
          >
            Gig 1 / 1
          </span>
        </div>

        <div class="player-header-actions">
          <button
            class="icon-button theme-toggle"
            type="button"
            data-theme-toggle
            aria-label="Switch theme"
            title="Switch theme (dark / light)"
          >
            <span class="to-light" aria-hidden="true">☀️</span>
            <span class="to-dark" aria-hidden="true">🌙</span>
          </button>
        </div>
      </header>

      <!-- PDF view -->
      <section
        id="pdfArea"
        class="pdf-area fit-page"
      >
        <canvas id="pdfCanvas"></canvas>

        <button
          id="previousPageButton"
          class="page-touch-area page-touch-left hidden"
          type="button"
          aria-label="Previous page"
          title="Previous page (←)"
        >
          <span class="page-arrow" aria-hidden="true">‹</span>
        </button>

        <button
          id="nextPageButton"
          class="page-touch-area page-touch-right hidden"
          type="button"
          aria-label="Next page"
          title="Next page (→)"
        >
          <span class="page-arrow" aria-hidden="true">›</span>
        </button>
      </section>

      <!-- Backing track playback -->
      <section class="transport">
        <div class="transport-main">
          <div
            class="tempo-control"
            role="group"
            aria-label="Tempo"
          >
            <button
              class="tempo-step"
              type="button"
              data-tempo-delta="-0.05"
              aria-label="Slow down"
              title="Slow down"
            >
              −
            </button>

            <button
              id="tempoValue"
              class="tempo-value"
              type="button"
              aria-label="Tempo, tap to reset"
              title="Tap to reset (100%)"
            >
              100 %
            </button>

            <button
              class="tempo-step"
              type="button"
              data-tempo-delta="0.05"
              aria-label="Speed up"
              title="Speed up"
            >
              +
            </button>
          </div>

          <div
            class="pitch-control"
            role="group"
            aria-label="Tuning"
          >
            <button
              id="pitchToggle"
              class="tempo-value pitch-value"
              type="button"
              aria-pressed="false"
              aria-label="Tuning reference, tap to switch between 440 and 415 Hz"
              title="Tap for 415 Hz (baroque, ½ step down)"
            >
              440 Hz
            </button>
          </div>

          <div class="transport-buttons">
            <button
              id="restartButton"
              class="transport-button media-symbol-button"
              type="button"
              aria-label="Restart song"
              title="Restart song"
            >
              ⏮
            </button>

            <button
              id="playPauseButton"
              class="play-button media-symbol-button"
              type="button"
              aria-label="Play"
              title="Play"
            >
              ▶
            </button>

            <button
              id="nextSongButton"
              class="transport-button media-symbol-button"
              type="button"
              aria-label="Next song"
              title="Next song"
            >
              ⏭
            </button>
          </div>
        </div>

        <div class="time-row">
          <span id="currentTime">
            00:00
          </span>

          <input
            id="audioSeek"
            type="range"
            min="0"
            max="0"
            value="0"
            step="0.1"
            aria-label="Playback position"
          >

          <span id="duration">
            00:00
          </span>
        </div>
      </section>
    </section>

    <!-- Rename song -->
    <dialog id="renameDialog">
      <form
        method="dialog"
        class="dialog-content"
      >
        <header class="dialog-header">
          <div>
            <h2>Rename song</h2>
          </div>

          <button
            id="renameCancelButton"
            class="icon-button"
            type="button"
          >
            Close
          </button>
        </header>

        <input
          id="renameInput"
          class="rename-input"
          type="text"
          required
          autocomplete="off"
          aria-label="Song title"
        >

        <button
          class="primary-button full-width"
          type="submit"
          value="save"
        >
          Save
        </button>
      </form>
    </dialog>

    <div
      id="toast"
      class="toast hidden"
      role="status"
      aria-live="polite"
    ></div>
  </main>

  <script
    type="module"
    src="./app.js"
  ></script>
</body>
</html>
